name: 👩‍🏫 Daily Verification Bot

on:
  schedule:
    # 23:00 UTC = 06:00 AM ไทย (ตลาดเพิ่งปิดและราคา Settlement นิ่งแล้ว)
    # 1-5 ใน UTC คือ คืนจันทร์-คืนศุกร์ (ซึ่งตรงกับเช้าอังคาร-เช้าเสาร์ไทยพอดี)
    - cron: '0 23 * * 1-5'
  workflow_dispatch:

jobs:
  run-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Verification Script
        env:
          # ใช้ Alpha Vantage เช็คราคา + Line แจ้งผล + Postgres อัปเดตผล
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PASS: ${{ secrets.DB_PASS }}
        run: |
          python verify_bot.py